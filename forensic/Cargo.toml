    "/fuzz",
    "/.github",
    "/docs",
    "/tests",
    "/tests/data/*.bin",
    "/tests/data/*.raw",
    "/tests/data/*.vhdx",
]

[dependencies]
refs-core = { workspace = true }
# ReFS structure knowledge + the shared report model (Severity/Observation).
forensicnomicon = { workspace = true }

[lints]
workspace = true
