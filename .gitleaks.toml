# gitleaks configuration — extends the default ruleset and allowlists known
# false positives. The committed refs fixtures under tests/data are raw ReFS
# on-disk bytes (boot VBR + superblock slice, Minstore container/object-table/
# directory metadata pages); their high-entropy regions (volume serials, packed
# keys, self-block numbers, CRCs) can trip gitleaks' generic high-entropy rules
# even though they hold no secrets. Scoped to the fixture paths so real secrets
# anywhere else still surface.
[extend]
useDefault = true

[allowlist]
description = "refs on-disk fixtures are ReFS filesystem bytes, not secrets"
paths = [
  '''tests/data/.*\.bin$''',
  '''tests/data/.*\.raw$''',
  '''tests/data/.*\.txt$''',
  '''tests/data/.*\.sha256$''',
]
